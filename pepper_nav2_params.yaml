amcl:
  ros__parameters:
    transform_tolerance: 2.0
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: /laser
    tf_broadcast: true

    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    min_particles: 500
    max_particles: 2000
    update_min_d: 0.10
    update_min_a: 0.10
    resample_interval: 1

    laser_model_type: likelihood_field
    max_beams: 60

    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    robot_model_type: nav2_amcl::OmniMotionModel


bt_navigator:
  ros__parameters:

    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    default_nav_to_pose_bt_xml: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    default_nav_through_poses_bt_xml: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_planner_selector_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node


planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ['GridBased']

    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.8
      use_astar: true
      allow_unknown: false
      use_final_approach_orientation: true


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3

    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['general_goal_checker']
    controller_plugins: ['FollowPath']


    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.10
      movement_time_allowance: 10.0


    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.20


    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.30
      lookahead_dist: 0.45
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.70
      lookahead_time: 1.2

      rotate_to_heading_angular_vel: 0.8

      transform_tolerance: 1.0
      use_velocity_scaled_lookahead_dist: true

      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.05


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 5.0
      publish_frequency: 2.0

      rolling_window: true

      width: 4
      height: 4
      resolution: 0.05

      robot_radius: 0.28

      always_send_full_costmap: true

      plugins: ['obstacle_layer', 'inflation_layer']


      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /laser
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 5.0
          obstacle_max_range: 4.0


      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 8.0
        inflation_radius: 0.20


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0

      resolution: 0.05

      track_unknown_space: true

      robot_radius: 0.28

      always_send_full_costmap: true

      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']


      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true


      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /laser
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5


      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 8.0
        inflation_radius: 0.20


behavior_server:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_footprint

    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    cycle_frequency: 10.0

    behavior_plugins: ['spin', 'backup', 'wait']

    spin:
      plugin: nav2_behaviors/Spin

    backup:
      plugin: nav2_behaviors/BackUp

    wait:
      plugin: nav2_behaviors/Wait


map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''


global_costmap_client:
  ros__parameters:
    use_sim_time: false


local_costmap_client:
  ros__parameters:
    use_sim_time: false