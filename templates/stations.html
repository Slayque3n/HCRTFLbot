<!DOCTYPE html>
<html>
<head>
    <title>{{ ui.select_station }}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8bbd0, #fce4ec);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            background: #ffffff;
            padding: 45px 50px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
            color: #c2185b;
        }

        .subtitle {
            color: #555;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .station-btn {
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 22px 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(236, 64, 122, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            line-height: 1.3;
        }

        .station-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(236, 64, 122, 0.4);
            background: #d81b60;
        }

        .station-btn:active {
            transform: scale(0.97);
        }

        .station-btn .number {
            display: block;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .other-section {
            background: #fce4ec;
            border-radius: 16px;
            padding: 22px 24px;
            margin-top: 10px;
        }

        .other-section label {
            display: block;
            font-weight: 600;
            color: #c2185b;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .other-row {
            display: flex;
            gap: 10px;
        }

        .other-row input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #f48fb1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .other-row input:focus {
            border-color: #c2185b;
        }

        .other-row button {
            padding: 14px 24px;
            background: #ec407a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .other-row button:hover {
            background: #d81b60;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            text-decoration: none;
            color: #c2185b;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        .back-link:hover { opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h2>{{ ui.select_station }}</h2>
    <p class="subtitle">{{ ui.station_subtitle }}</p>

    <!-- 10 station buttons, each submits the English value to the LLM -->
    <form method="POST" action="{{ url_for('stations_result') }}">
        <input type="hidden" name="language" value="{{ language }}">
        <div class="grid">
            {% for display, value in stations %}
            <button class="station-btn" type="submit" name="station" value="{{ value }}">
                <span class="number">{{ loop.index }}</span>{{ display }}
            </button>
            {% endfor %}
        </div>
    </form>

    <!-- Other: type your own station -->
    <div class="other-section">
        <label>{{ ui.other }}</label>
        <form method="POST" action="{{ url_for('stations_result') }}">
            <input type="hidden" name="language" value="{{ language }}">
            <div class="other-row">
                <input type="text" name="station" placeholder="{{ ui.other_placeholder }}" required>
                <button type="submit">{{ ui.go }}</button>
            </div>
        </form>
    </div>

    <a class="back-link" href="{{ url_for('speak', language=language) }}">{{ ui.back }}</a>
</div>

</body>
</html>
